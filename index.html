<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VIDA | Face Match Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #00c37b; 
      --secondary: #011627; 
      --bg-body: #f4f7f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: white;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .header-logo { height: 38px; }

    .container {
      max-width: 500px;
      margin: 2rem auto;
      padding: 0 1rem;
      flex-grow: 1;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* TOP TOGGLE: High Visibility Mode Switcher */
    .mode-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #f1f5f9;
      padding: 5px;
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    .mode-btn {
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .mode-btn.active {
      background: white;
      color: var(--secondary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* CLEAN VIEWPORT: No overlays inside */
    .viewport-container {
      width: 100%;
      aspect-ratio: 1/1;
      margin-bottom: 1.5rem;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    video, #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* BUTTON STYLES */
    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary { background: var(--secondary); color: white; }
    .btn-success { background: var(--primary); color: white; border: none; }
    .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }
    
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }

    /* CONSOLE OUTPUT */
    #result {
      margin-top: 1.5rem;
      font-size: 12px;
      background: #0f172a;
      color: #94a3b8;
      padding: 1rem;
      border-radius: 12px;
      max-height: 150px;
      overflow-y: auto;
      font-family: 'Fira Code', monospace;
      white-space: pre-wrap;
    }

    footer {
      padding: 2rem;
      text-align: center;
      background: white;
      border-top: 1px solid var(--border);
    }

    .footer-logo { height: 18px; vertical-align: middle; }
  </style>
</head>

<body>

<header>
  <img src="https://fintechid-bucket.s3.ap-southeast-3.amazonaws.com/aftech/company/logo/ae7c5b5c-9182-4eac-850c-e44e1c9e19aa.png" alt="VIDA" class="header-logo">
</header>

<div class="container">
  <div class="card">
    
    <div class="mode-selector">
      <button id="mode-enroll" class="mode-btn active" onclick="setMode('enroll')">Enroll Face</button>
      <button id="mode-search" class="mode-btn" onclick="setMode('search')">Search / Verify</button>
    </div>

    <div class="viewport-container">
      <video id="video" autoplay playsinline></video>
      <img id="preview" style="display:none;">
      <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="action-stack">
      <button id="btn-start" class="btn btn-primary" onclick="openCamera()">Open Camera</button>
      
      <button id="btn-snap" class="btn btn-success" style="display:none;" onclick="capture()">Capture Photo</button>
      
      <button id="btn-submit" class="btn btn-primary" style="display:none;" onclick="submitAction()">Run Face Match</button>
      <button id="btn-retry" class="btn btn-outline" style="display:none;" onclick="resetCamera()">← Back / Retry</button>
      
      <button id="btn-upload" class="btn btn-outline" onclick="document.getElementById('fileInput').click()">Upload from Device</button>
      <input type="file" id="fileInput" accept="image/*" onchange="uploadFile(event)" style="display:none;"/>
    </div>

    <div id="result" style="display:none;"></div>
  </div>
</div>

<footer>
  <span style="font-size: 0.8rem; color: #64748b;">Powered by</span>
  <img src="https://fintechid-bucket.s3.ap-southeast-3.amazonaws.com/aftech/company/logo/ae7c5b5c-9182-4eac-850c-e44e1c9e19aa.png" alt="VIDA" class="footer-logo">
</footer>

<script>
let imageBase64 = "";
let stream = null;
let currentMode = "enroll";

const v = document.getElementById("video");
const p = document.getElementById("preview");
const resDiv = document.getElementById("result");

const bStart = document.getElementById("btn-start");
const bSnap = document.getElementById("btn-snap");
const bSubmit = document.getElementById("btn-submit");
const bRetry = document.getElementById("btn-retry");
const bUpload = document.getElementById("btn-upload");

function setMode(mode) {
  currentMode = mode;
  document.getElementById("mode-enroll").classList.toggle("active", mode === 'enroll');
  document.getElementById("mode-search").classList.toggle("active", mode === 'search');
  resDiv.style.display = "none";
}

async function openCamera() {
  resDiv.style.display = "none";
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { width: 600, height: 600, facingMode: "user" }
    });
    stream = s;
    v.srcObject = s;
    v.style.display = "block";
    p.style.display = "none";

    // Toggle Buttons
    bStart.style.display = "none";
    bUpload.style.display = "none";
    bSnap.style.display = "flex";
    bRetry.style.display = "flex";
  } catch(err) {
    alert("Camera error: Please check permissions.");
  }
}

function resetCamera() {
  if(stream) stream.getTracks().forEach(t => t.stop());
  v.style.display = "none";
  p.style.display = "none";
  bStart.style.display = "flex";
  bUpload.style.display = "flex";
  bSnap.style.display = "none";
  bSubmit.style.display = "none";
  bRetry.style.display = "none";
  imageBase64 = "";
}

function capture() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 600;
  canvas.height = 600;
  ctx.drawImage(v, 0, 0, 600, 600);

  imageBase64 = canvas.toDataURL("image/jpeg").split(",")[1];
  p.src = "data:image/jpeg;base64," + imageBase64;
  
  v.style.display = "none";
  p.style.display = "block";
  bSnap.style.display = "none";
  bSubmit.style.display = "flex";
  
  if(stream) stream.getTracks().forEach(t => t.stop());
}

function uploadFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function() {
    imageBase64 = reader.result.split(",")[1];
    p.src = reader.result;
    v.style.display = "none";
    p.style.display = "block";
    
    bStart.style.display = "none";
    bUpload.style.display = "none";
    bSubmit.style.display = "flex";
    bRetry.style.display = "flex";
  }
  reader.readAsDataURL(file);
}

async function submitAction() {
  resDiv.style.display = "block";
  resDiv.textContent = "// Processing " + currentMode.toUpperCase() + "...";
  
  const actionValue = currentMode === "search" ? "search" : "blacklist";

  try {
    const res = await fetch("/.netlify/functions/face", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: actionValue, faceImage: imageBase64 })
    });
    const data = await res.json();
    resDiv.textContent = JSON.stringify(data, null, 2);
  } catch(err) {
    resDiv.textContent = "Error: " + err.message;
  }
}
</script>

</body>
</html>
