<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VIDA | Face Match Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #00c37b; 
      --secondary: #011627; 
      --bg-body: #f4f7f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: white;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .header-logo { height: 38px; }

    .container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      flex-grow: 1;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
    }

    /* Camera Viewport Wrapper */
    .viewport-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1/1;
      margin: 0 auto 1.5rem;
      background: #000;
      border-radius: 50%; /* Circle for face focus */
      overflow: hidden;
      border: 4px solid var(--border);
    }

    video, #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Face Silhouette Guide Overlay */
    .face-guide {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"><path d="M50 20c-10 0-18 8-18 20 0 15 8 25 18 25s18-10 18-25c0-12-8-20-18-20zM35 75c0-10 10-15 15-15s15 5 15 15" /></svg>');
      background-size: cover;
      pointer-events: none;
    }

    /* Step-based Buttons */
    .action-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-family: inherit;
    }

    .btn-main { background: var(--secondary); color: white; width: 100%; }
    .btn-capture { background: var(--primary); color: white; border: none; }
    .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-muted); }
    
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }

    /* Settings & Mode */
    .mode-settings {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      margin-top: 1.5rem;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #cbd5e1;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(22px); }

    #result {
      margin-top: 1.5rem;
      font-size: 12px;
      text-align: left;
      background: #0f172a;
      color: #94a3b8;
      padding: 1rem;
      border-radius: 12px;
      max-height: 150px;
      overflow-y: auto;
      font-family: monospace;
    }

    footer {
      padding: 2rem;
      text-align: center;
      background: white;
      border-top: 1px solid var(--border);
    }
    .footer-logo { height: 18px; vertical-align: middle; }
  </style>
</head>

<body>

<header>
  <img src="https://fintechid-bucket.s3.ap-southeast-3.amazonaws.com/aftech/company/logo/ae7c5b5c-9182-4eac-850c-e44e1c9e19aa.png" alt="VIDA" class="header-logo">
</header>

<div class="container">
  <div class="card">
    <h2 style="margin-top:0; font-size: 1.25rem;">Face Recognition</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Position your face within the circle and follow the prompts.</p>
    
    <div class="viewport-container">
      <video id="video" autoplay playsinline></video>
      <img id="preview" style="display:none;">
      <div class="face-guide" id="guide"></div>
      <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="action-area">
      <button id="btn-start" class="btn btn-main" onclick="openCamera()">Start Camera</button>
      <button id="btn-snap" class="btn btn-capture" style="display:none;" onclick="capture()">Capture Photo</button>
      <button id="btn-retake" class="btn btn-outline" style="display:none;" onclick="openCamera()">Retake Photo</button>
      <button id="btn-upload" class="btn btn-outline" onclick="document.getElementById('fileInput').click()">Upload from Gallery</button>
      <input type="file" id="fileInput" accept="image/*" onchange="uploadFile(event)" style="display:none;"/>
    </div>

    <div class="mode-settings">
      <span style="font-size: 0.85rem; font-weight: 600;">Processing Mode: <span id="modeLabel" style="color: var(--primary)">Enroll</span></span>
      <label class="switch">
        <input type="checkbox" id="modeToggle" onchange="updateModeLabel()">
        <span class="slider"></span>
      </label>
    </div>

    <button id="btn-submit" class="btn btn-main" style="margin-top: 10px; opacity: 0.5;" onclick="submitAction()" disabled>Run Analysis</button>
    <div id="result" style="display:none;"></div>
  </div>
</div>

<footer>
  <span style="font-size: 0.8rem; color: #64748b;">Powered by</span>
  <img src="https://fintechid-bucket.s3.ap-southeast-3.amazonaws.com/aftech/company/logo/ae7c5b5c-9182-4eac-850c-e44e1c9e19aa.png" alt="VIDA" class="footer-logo">
</footer>

<script>
let imageBase64 = "";
let stream = null;

const v = document.getElementById("video");
const p = document.getElementById("preview");
const g = document.getElementById("guide");
const btnStart = document.getElementById("btn-start");
const btnSnap = document.getElementById("btn-snap");
const btnRetake = document.getElementById("btn-retake");
const btnSubmit = document.getElementById("btn-submit");

async function openCamera() {
  imageBase64 = "";
  btnSubmit.disabled = true;
  btnSubmit.style.opacity = "0.5";
  
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { width: 600, height: 600, facingMode: "user" }
    });
    stream = s;
    v.srcObject = s;
    v.style.display = "block";
    p.style.display = "none";
    g.style.display = "block";
    
    btnStart.style.display = "none";
    btnSnap.style.display = "block";
    btnRetake.style.display = "none";
  } catch(err) {
    alert("Camera access denied.");
  }
}

function capture() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  
  canvas.width = 600;
  canvas.height = 600;
  ctx.drawImage(v, 0, 0, 600, 600);

  imageBase64 = canvas.toDataURL("image/jpeg").split(",")[1];
  p.src = "data:image/jpeg;base64," + imageBase64;
  
  // UI Switch
  v.style.display = "none";
  p.style.display = "block";
  g.style.display = "none";
  btnSnap.style.display = "none";
  btnRetake.style.display = "block";
  btnSubmit.disabled = false;
  btnSubmit.style.opacity = "1";

  if(stream) stream.getTracks().forEach(t => t.stop());
}

function uploadFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function() {
    imageBase64 = reader.result.split(",")[1];
    p.src = reader.result;
    v.style.display = "none";
    p.style.display = "block";
    g.style.display = "none";
    btnStart.style.display = "block";
    btnSnap.style.display = "none";
    btnRetake.style.display = "none";
    btnSubmit.disabled = false;
    btnSubmit.style.opacity = "1";
    if(stream) stream.getTracks().forEach(t => t.stop());
  }
  reader.readAsDataURL(file);
}

function updateModeLabel() {
  const isSearch = document.getElementById("modeToggle").checked;
  document.getElementById("modeLabel").textContent = isSearch ? "Search" : "Enroll";
}

function submitAction() {
  const action = document.getElementById("modeToggle").checked ? "search" : "blacklist";
  const resDiv = document.getElementById("result");
  resDiv.style.display = "block";
  resDiv.textContent = "// Processing request...";
  
  fetch("/.netlify/functions/face", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: action, faceImage: imageBase64 })
  })
  .then(res => res.json())
  .then(data => { resDiv.textContent = JSON.stringify(data, null, 2); })
  .catch(err => { resDiv.textContent = "Error: " + err.message; });
}
</script>

</body>
</html>
